# ============================================
# МОДЕЛИ И API
# ============================================
models:
  whisper:
    provider: "local"
    model_size: "large-v3"
    device: "cuda"
    gpu_id: 0
    compute_type: "float16"
    language: "en"
    temperature: 0.0

  translation:
    provider: "openrouter"
    model: "google/gemini-2.5-flash-lite-preview-09-2025"
    api_key_env: "OPENROUTER_API_KEY"
    temperature: 0.3
    max_tokens: 512
    streaming: true

  tts:
    provider: "qwen3"
    device: "cuda"
    gpu_id: 1
    voice_sample: "voice_samples/Aleksandr.wav"
    qwen3_ref_text: ""   # optional transcription of voice_sample for better ZeroShot quality
    output_sample_rate: 24000
    speed: 1.5  # ffmpeg atempo speed (1.0 = normal, 2.0 = 2x faster, applied after synthesis)
    temperature: 0.9  # Qwen3 generation temperature
    daemon_port: 18432   # persistent Qwen3 daemon port (survives server restarts — only loads model once)
    fish_speech_url: "http://localhost:8080"  # Fish Speech 1.5 API server
    top_p: 0.8          # Fish Speech sampling parameter
    repetition_penalty: 1.1  # Fish Speech repetition penalty
    adaptive_speed:
      enabled: false  # TEMPORARY DISABLE for debugging pauses
      min_speed: 1.3   # Minimum speed (when queue is small)
      max_speed: 2.0   # Maximum speed (when queue is large) - can go higher if needed
      queue_threshold_low: 2   # If queue <= 2 chunks, use min_speed
      queue_threshold_high: 5  # If queue >= 5 chunks, use max_speed (linear interpolation in between)

# ============================================
# PIPELINE ПАРАМЕТРЫ
# ============================================
pipeline:
  context_window: 5   # 5 pairs optimal (research: 3-5, was 30 — too much noise for LLM)
  context_max_chars: 900  # ~300 tokens EN+RU (was 6000 — excess latency)
  batch_queue_size: 12  # Pipeline processing: 12 slots for fast parallel processing
  max_batch_duration: 15.0
  min_ready_chunks_before_start: 1  # TRUE STREAMING: Играть каждый чанк сразу как готов (no buffering)
  max_ready_queue_size: 999  # TEMPORARY: Disabled overflow protection for debugging (was: 10)
  
  vad:
    enabled: true
    threshold: 0.5
    min_speech_duration: 0.25   # 250ms minimum speech (was 3.0s — too slow to start)
    min_silence_duration: 0.7   # 700ms silence = end of phrase (research: optimal for natural pauses)
    min_chunk_duration: 2.0     # 2s minimum chunk (was 12.0s — latency killer)
    max_phrase_duration: 8.0    # 8s max chunk (was 18.0s — force flush earlier)
    speech_pad_ms: 200
  
  audio:
    sample_rate: 16000
    chunk_duration_ms: 100
    buffer_duration_sec: 30
  
  timeouts:
    whisper_api: 30.0
    translation_api: 10.0
    tts_synthesis: 15.0
  
  retry:
    max_attempts: 3
    backoff_factor: 1.5

# ============================================
# WEB SERVER
# ============================================
server:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "*"
  websocket_max_size: 10485760

# ============================================
# МОНИТОРИНГ И ЛОГИ
# ============================================
monitoring:
  enabled: true
  log_level: "INFO"
  log_dir: "./logs"
  
  metrics:
    collect_interval: 5.0
    vram_alert_threshold: 14000
    latency_alert_threshold: 10.0
  
  session:
    save_transcripts: true
    save_translations: true
    save_audio: false

# ============================================
# FEATURE FLAGS
# ============================================
features:
  smart_chunking: true
  hallucination_filter: true
  translation_cache: false
  adaptive_batching: true
